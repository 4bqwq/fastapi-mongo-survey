<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填写问卷 - 问卷系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/auth.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm p-4 text-center">
        <h1 id="surveyTitle" class="text-xl font-bold text-gray-800">加载中...</h1>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        <div id="surveyDesc" class="text-gray-600 mb-8 text-center"></div>
        
        <form id="fillingForm" class="space-y-6">
            <div id="questionsContainer" class="space-y-6">
                <!-- Questions will be rendered here -->
            </div>
            
            <div class="pt-6 border-t flex justify-center">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-full font-bold shadow-lg transition">
                    提交答卷
                </button>
            </div>
        </form>
    </main>

    <script>
        const surveyId = "{{ survey_id }}";
        let surveySchema = null;
        let payloads = {};

        async function loadSurvey() {
            // Fillers must also be logged in as per spec (GET /schema requires auth)
            if (!isLoggedIn()) {
                window.location.href = `/login?next=/survey/${surveyId}`;
                return;
            }

            const response = await authenticatedFetch(`/api/v1/surveys/${surveyId}/schema`);
            const result = await response.json();
            if (response.ok) {
                surveySchema = result.data;
                document.getElementById('surveyTitle').textContent = surveySchema.title;
                document.getElementById('surveyDesc').textContent = surveySchema.description;
                renderQuestions();
                evaluateLogic(); // Initial logic run
            } else {
                alert('获取问卷失败: ' + result.detail?.message);
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            surveySchema.questions.sort((a, b) => a.orderIndex - b.orderIndex).forEach(q => {
                const qDiv = document.createElement('div');
                qDiv.id = `qbox_${q.questionId}`;
                qDiv.className = 'bg-white p-6 rounded-xl shadow-sm border transition-all duration-300';
                
                let inputHtml = '';
                if (q.type === 'ChoiceQuestion') {
                    const isMultiple = (q.maxSelect || 1) > 1;
                    inputHtml = q.options.map(opt => `
                        <label class="flex items-center space-x-3 p-2 hover:bg-gray-50 rounded cursor-pointer">
                            <input type="${isMultiple ? 'checkbox' : 'radio'}" name="${q.questionId}" value="${opt}" 
                                onchange="onInputChange('${q.questionId}', this)" class="h-4 w-4 text-blue-600">
                            <span>${opt}</span>
                        </label>
                    `).join('');
                } else if (q.type === 'NumberQuestion') {
                    inputHtml = `<input type="number" oninput="onInputChange('${q.questionId}', this)" 
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="请输入数字">`;
                } else {
                    inputHtml = `<textarea oninput="onInputChange('${q.questionId}', this)" 
                        class="w-full border rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none" rows="3" placeholder="请输入内容"></textarea>`;
                }

                qDiv.innerHTML = `
                    <div class="mb-4">
                        <span class="text-blue-600 font-bold mr-2">${q.orderIndex}.</span>
                        <span class="font-semibold text-gray-800">${q.title}</span>
                        ${q.isRequired ? '<span class="text-red-500 ml-1">*</span>' : ''}
                    </div>
                    <div class="space-y-2">
                        ${inputHtml}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function onInputChange(qId, el) {
            const q = surveySchema.questions.find(q => q.questionId === qId);
            if (q.type === 'ChoiceQuestion') {
                const checked = Array.from(document.querySelectorAll(`input[name="${qId}"]:checked`)).map(i => i.value);
                payloads[qId] = checked;
            } else if (q.type === 'NumberQuestion') {
                payloads[qId] = el.value === '' ? null : parseFloat(el.value);
            } else {
                payloads[qId] = el.value;
            }
            evaluateLogic();
        }

        function evaluateLogic() {
            // Reset visibility
            surveySchema.questions.forEach(q => {
                document.getElementById(`qbox_${q.questionId}`).classList.remove('hidden');
            });

            let hiddenQuestions = new Set();
            
            // Sort questions to evaluate in order
            const sortedQs = [...surveySchema.questions].sort((a, b) => a.orderIndex - b.orderIndex);
            
            for (let i = 0; i < sortedQs.length; i++) {
                const q = sortedQs[i];
                if (hiddenQuestions.has(q.questionId)) continue;

                const rule = surveySchema.logic_rules.find(r => r.sourceQuestionId === q.questionId);
                if (rule && payloads[q.questionId]) {
                    const currentAns = payloads[q.questionId];
                    let match = false;
                    
                    if (Array.isArray(currentAns)) {
                        match = currentAns.includes(rule.triggerCondition);
                    } else {
                        match = String(currentAns) === String(rule.triggerCondition);
                    }

                    if (match) {
                        const targetQ = surveySchema.questions.find(t => t.questionId === rule.targetQuestionId);
                        if (targetQ) {
                            // Hide all questions between current and target
                            sortedQs.forEach(middleQ => {
                                if (middleQ.orderIndex > q.orderIndex && middleQ.orderIndex < targetQ.orderIndex) {
                                    hiddenQuestions.add(middleQ.questionId);
                                }
                            });
                        }
                    }
                }
            }

            hiddenQuestions.forEach(id => {
                document.getElementById(`qbox_${id}`).classList.add('hidden');
            });
        }

        document.getElementById('fillingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Filter payloads to only include visible questions
            const visiblePayloads = {};
            surveySchema.questions.forEach(q => {
                const el = document.getElementById(`qbox_${q.questionId}`);
                if (!el.classList.contains('hidden')) {
                    if (payloads[q.questionId] !== undefined) {
                        visiblePayloads[q.questionId] = payloads[q.questionId];
                    }
                }
            });

            const response = await authenticatedFetch(`/api/v1/surveys/${surveyId}/answers`, {
                method: 'POST',
                body: JSON.stringify({ payloads: visiblePayloads })
            });

            const result = await response.json();
            if (response.ok) {
                alert('提交成功！感谢参与。');
                window.location.href = '/dashboard';
            } else {
                alert('提交失败: ' + (result.detail?.message || JSON.stringify(result.detail)));
            }
        });

        loadSurvey();
    </script>
</body>
</html>
