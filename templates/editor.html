<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>问卷编辑器 - 问卷系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/js/auth.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <div class="flex items-center space-x-4">
            <a href="/dashboard" class="text-blue-600 hover:underline">← 返回看板</a>
            <h1 id="surveyTitle" class="text-xl font-bold text-gray-800">加载中...</h1>
        </div>
        <button onclick="saveSchema()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg shadow-sm transition">
            保存问卷
        </button>
    </nav>

    <div class="container mx-auto p-6 flex flex-col md:flex-row gap-6">
        <div class="flex-1 space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">问卷标题</label>
                    <input id="metaTitle" type="text" class="w-full border rounded p-2 mt-1">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase">问卷说明</label>
                    <textarea id="metaDescription" class="w-full border rounded p-2 mt-1" rows="3"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <label class="flex items-center text-sm font-medium text-gray-700 mt-6">
                        <input id="metaAnonymous" type="checkbox" class="mr-2"> 允许填写者匿名提交
                    </label>
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase">截止时间</label>
                        <input id="metaEndTime" type="datetime-local" class="w-full border rounded p-2 mt-1">
                    </div>
                </div>
            </div>
            <div id="questionsContainer" class="space-y-4">
                <!-- Questions -->
            </div>
            
            <div class="bg-white p-6 rounded-xl border-2 border-dashed border-gray-300 flex justify-center space-x-4">
                <button onclick="addQuestion('ChoiceQuestion')" class="text-blue-600 hover:bg-blue-50 px-4 py-2 rounded">+ 选择题</button>
                <button onclick="addQuestion('TextQuestion')" class="text-blue-600 hover:bg-blue-50 px-4 py-2 rounded">+ 文本题</button>
                <button onclick="addQuestion('NumberQuestion')" class="text-blue-600 hover:bg-blue-50 px-4 py-2 rounded">+ 数字题</button>
            </div>
        </div>

        <div class="w-full md:w-80 space-y-4">
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold mb-4 text-sm uppercase text-gray-400">设置项说明</h3>
                <ul class="text-xs space-y-2 text-gray-500">
                    <li>• <b>必答题</b>：开启后用户必须填写此题。</li>
                    <li>• <b>跳转逻辑</b>：当回答匹配条件时，将直接跳转到目标题目，跳过中间题目。</li>
                    <li>• <b>校验</b>：目标题目必须在当前题目之后。</li>
                </ul>
            </div>
            <div id="logicRulesSummary" class="bg-white p-6 rounded-xl shadow-sm border">
                <h3 class="font-bold mb-4">全局规则概览</h3>
                <div id="rulesList" class="space-y-2 text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const surveyId = "{{ survey_id }}";
        let questions = [];
        let logicRules = [];
        let surveyMeta = {};

        function toDatetimeLocal(value) {
            if (!value) return '';
            const date = new Date(value);
            const pad = (n) => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        async function loadSchema() {
            const response = await authenticatedFetch(`/api/v1/surveys/${surveyId}/schema`);
            const result = await response.json();
            if (response.ok) {
                surveyMeta = {
                    title: result.data.title || '',
                    description: result.data.description || '',
                    is_anonymous: !!result.data.is_anonymous,
                    end_time: result.data.end_time || null
                };
                document.getElementById('surveyTitle').textContent = surveyMeta.title || '未命名问卷';
                document.getElementById('metaTitle').value = surveyMeta.title;
                document.getElementById('metaDescription').value = surveyMeta.description;
                document.getElementById('metaAnonymous').checked = surveyMeta.is_anonymous;
                document.getElementById('metaEndTime').value = toDatetimeLocal(surveyMeta.end_time);
                questions = result.data.questions || [];
                logicRules = result.data.logic_rules || [];
                renderEditor();
            }
        }

        function addQuestion(type) {
            const id = 'q_' + Math.random().toString(36).substr(2, 9);
            const newQ = {
                questionId: id,
                type: type,
                isRequired: true,
                orderIndex: questions.length + 1,
                title: '未命名题目'
            };
            if (type === 'ChoiceQuestion') {
                newQ.options = ['选项1', '选项2'];
                newQ.minSelect = 1;
                newQ.maxSelect = 1;
            }
            questions.push(newQ);
            renderEditor();
        }

        function removeQuestion(id) {
            questions = questions.filter(q => q.questionId !== id);
            logicRules = logicRules.filter(r => r.sourceQuestionId !== id && r.targetQuestionId !== id);
            renderEditor();
        }

        function renderEditor() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            questions.forEach((q, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'bg-white p-6 rounded-xl shadow-sm border relative';
                
                let typeSpecHtml = '';
                if (q.type === 'ChoiceQuestion') {
                    typeSpecHtml = `
                        <div class="mt-4">
                            <label class="text-xs font-bold text-gray-400 uppercase">选项集 (每行一个)</label>
                            <textarea onchange="updateQ('${q.questionId}', 'options', this.value.split('\\n'))" class="w-full border rounded p-2 mt-1 font-sans text-sm">${(q.options || []).join('\n')}</textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <div>
                                <label class="text-xs">最少选择数</label>
                                <input type="number" min="1" value="${q.minSelect ?? ''}" onchange="updateQ('${q.questionId}', 'minSelect', this.value === '' ? null : parseInt(this.value, 10))" class="w-full border rounded p-1">
                            </div>
                            <div>
                                <label class="text-xs">最多选择数</label>
                                <input type="number" min="1" value="${q.maxSelect ?? ''}" onchange="updateQ('${q.questionId}', 'maxSelect', this.value === '' ? null : parseInt(this.value, 10))" class="w-full border rounded p-1">
                            </div>
                        </div>
                    `;
                } else if (q.type === 'TextQuestion') {
                    typeSpecHtml = `
                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <div>
                                <label class="text-xs">最少字数</label>
                                <input type="number" min="0" value="${q.minLength ?? ''}" onchange="updateQ('${q.questionId}', 'minLength', this.value === '' ? null : parseInt(this.value, 10))" class="w-full border rounded p-1">
                            </div>
                            <div>
                                <label class="text-xs">最多字数</label>
                                <input type="number" min="0" value="${q.maxLength ?? ''}" onchange="updateQ('${q.questionId}', 'maxLength', this.value === '' ? null : parseInt(this.value, 10))" class="w-full border rounded p-1">
                            </div>
                        </div>
                    `;
                } else if (q.type === 'NumberQuestion') {
                    typeSpecHtml = `
                        <div class="grid grid-cols-2 gap-4 mt-4">
                            <div>
                                <label class="text-xs">最小值</label>
                                <input type="number" value="${q.minValue || ''}" onchange="updateQ('${q.questionId}', 'minValue', this.value === '' ? null : parseFloat(this.value))" class="w-full border rounded p-1">
                            </div>
                            <div>
                                <label class="text-xs">最大值</label>
                                <input type="number" value="${q.maxValue || ''}" onchange="updateQ('${q.questionId}', 'maxValue', this.value === '' ? null : parseFloat(this.value))" class="w-full border rounded p-1">
                            </div>
                        </div>
                        <label class="flex items-center text-sm text-gray-700 mt-4">
                            <input type="checkbox" ${q.mustBeInteger ? 'checked' : ''} onchange="updateQ('${q.questionId}', 'mustBeInteger', this.checked)" class="mr-2"> 仅允许整数
                        </label>
                    `;
                }

                const rulesForQ = logicRules.filter(r => r.sourceQuestionId === q.questionId);
                const targetQs = questions.filter(t => t.orderIndex > q.orderIndex);
                
                let rulesHtml = rulesForQ.map((r, ri) => `
                    <div class="flex items-center space-x-2 text-sm bg-white p-2 rounded border border-blue-100 mb-2">
                        <span>若为</span>
                        <input type="text" value="${r.triggerCondition}" onchange="updateRuleAttr('${r.ruleId}', 'triggerCondition', this.value)" class="border rounded p-1 w-24">
                        <span>跳至</span>
                        <select onchange="updateRuleAttr('${r.ruleId}', 'targetQuestionId', this.value)" class="border rounded p-1 flex-1">
                            <option value="">-- 请选择题目 --</option>
                            ${targetQs.map(t => `<option value="${t.questionId}" ${r.targetQuestionId === t.questionId ? 'selected' : ''}>${t.orderIndex}. ${t.title}</option>`).join('')}
                        </select>
                        <button onclick="removeRule('${r.ruleId}')" class="text-red-400 hover:text-red-600 px-1">×</button>
                    </div>
                `).join('');

                qDiv.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-gray-400 text-sm">第${index + 1}题 [${q.type}]</span>
                        <div class="flex items-center space-x-4">
                            <label class="flex items-center text-sm font-medium text-gray-700">
                                <input type="checkbox" ${q.isRequired ? 'checked' : ''} onchange="updateQ('${q.questionId}', 'isRequired', this.checked)" class="mr-2"> 必答
                            </label>
                            <button onclick="removeQuestion('${q.questionId}')" class="text-red-400 hover:text-red-600 text-sm">删除题目</button>
                        </div>
                    </div>
                    <input type="text" value="${q.title || ''}" onchange="updateQ('${q.questionId}', 'title', this.value)" placeholder="请输入题目标题" class="text-lg font-bold w-full border-b focus:border-blue-500 outline-none py-1 mb-2">
                    
                    ${typeSpecHtml}

                    <div class="mt-6 p-4 bg-blue-50 rounded-xl">
                        <div class="flex justify-between items-center mb-3">
                            <h5 class="text-xs font-bold text-blue-800 uppercase tracking-wider">跳转逻辑设置</h5>
                            <button onclick="addRule('${q.questionId}')" class="text-xs bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-700">+ 添加规则</button>
                        </div>
                        <div id="rules_container_${q.questionId}">
                            ${rulesHtml || '<p class="text-xs text-blue-300 italic">尚未配置跳转规则</p>'}
                        </div>
                    </div>
                `;
                container.appendChild(qDiv);
            });
            renderRulesSummary();
        }

        function updateQ(id, field, value) {
            const q = questions.find(q => q.questionId === id);
            if (q) q[field] = value;
            if (field === 'title' || field === 'isRequired') renderRulesSummary();
        }

        function addRule(qId) {
            const ruleId = 'r_' + Math.random().toString(36).substr(2, 9);
            logicRules.push({ ruleId, sourceQuestionId: qId, triggerCondition: '', targetQuestionId: '' });
            renderEditor();
        }

        function removeRule(ruleId) {
            logicRules = logicRules.filter(r => r.ruleId !== ruleId);
            renderEditor();
        }

        function updateRuleAttr(ruleId, attr, value) {
            const rule = logicRules.find(r => r.ruleId === ruleId);
            if (rule) rule[attr] = value;
            renderRulesSummary();
        }

        function renderRulesSummary() {
            const list = document.getElementById('rulesList');
            list.innerHTML = logicRules.map(r => {
                const src = questions.find(q => q.questionId === r.sourceQuestionId);
                const target = questions.find(q => q.questionId === r.targetQuestionId);
                if (!src || !target) return '';
                return `<div class="p-2 bg-gray-50 rounded border border-gray-100 text-xs"><b>第${src.orderIndex}题</b> 等于 "${r.triggerCondition}" → <b>第${target.orderIndex}题</b></div>`;
            }).filter(h => h).join('') || '<p class="text-gray-400 italic">暂无生效规则</p>';
        }

        async function saveSchema() {
            questions.forEach((q, i) => q.orderIndex = i + 1);

            const metadataPayload = {
                title: document.getElementById('metaTitle').value.trim(),
                description: document.getElementById('metaDescription').value,
                is_anonymous: document.getElementById('metaAnonymous').checked,
                end_time: document.getElementById('metaEndTime').value ? new Date(document.getElementById('metaEndTime').value).toISOString() : null
            };

            const metadataResp = await authenticatedFetch(`/api/v1/surveys/${surveyId}`, {
                method: 'PATCH',
                body: JSON.stringify(metadataPayload)
            });

            if (!metadataResp.ok) {
                const err = await metadataResp.json();
                alert('保存失败: ' + (err.detail?.message || JSON.stringify(err.detail)));
                return;
            }
            
            const payload = {
                questions: questions,
                logic_rules: logicRules.filter(r => r.triggerCondition && r.targetQuestionId)
            };

            const response = await authenticatedFetch(`/api/v1/surveys/${surveyId}/schema`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('保存成功！跳转逻辑已校验并更新。');
                loadSchema(); // Reload to refresh everything
            } else {
                const err = await response.json();
                alert('保存失败: ' + (err.detail?.message || JSON.stringify(err.detail)));
            }
        }

        loadSchema();
    </script>
</body>
</html>
